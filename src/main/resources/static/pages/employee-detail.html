<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>员工详情 - OA协同办公平台</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ============================================================
     TOPBAR
     ============================================================ -->
<header class="topbar">
  <div class="logo"><div class="logo-icon">OA</div>OA协同办公平台</div>
  <div class="crumb">首页 / 工作台 / <span id="detailCrumb">加载中...</span></div>
  <div class="user">
    <button class="btn btn-sm" style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);color:#fff;" onclick="window.location.href='../index.html'">← 返回工作台</button>
  </div>
</header>

<!-- ============================================================
     MAIN CONTENT
     ============================================================ -->
<div class="main" style="max-width:1100px;margin:0 auto;">
  <div id="detailContent">
    <div class="cal-loading">加载员工信息中...</div>
  </div>
</div>

<!-- ============================================================
     HIDDEN TEMPLATE (rendered by JS)
     ============================================================ -->
<div id="detailTemplate" style="display:none;">

  <div class="page-header">
    <div class="page-title"><span class="icon">👤</span>员工档案详情</div>
  </div>

  <!-- 基本信息 -->
  <div class="card">
    <div class="card-hd"><h3>基本信息</h3></div>
    <div class="card-bd">
      <div class="info-grid">
        <div class="info-item"><label>工号</label><span id="infoEmpNo">加载中...</span></div>
        <div class="info-item"><label>姓名</label><span id="infoName">加载中...</span></div>
        <div class="info-item"><label>性别</label><span id="infoGender">加载中...</span></div>
        <div class="info-item"><label>所属部门</label><span id="infoDept">加载中...</span></div>
        <div class="info-item"><label>职位</label><span id="infoPosition">加载中...</span></div>
        <div class="info-item"><label>入职日期</label><span id="infoEntryDate">加载中...</span></div>
        <div class="info-item"><label>在职状态</label><span id="infoStatus"><span class="tag t-gray">加载中...</span></span></div>
        <div class="info-item"><label>手机号</label><span id="infoPhone">加载中...</span></div>
        <div class="info-item"><label>邮箱</label><span id="infoEmail">加载中...</span></div>
      </div>
    </div>
  </div>

  <!-- 本月考勤统计 -->
  <div class="card">
    <div class="card-hd"><h3>本月考勤统计</h3></div>
    <div class="card-bd">
      <div class="stats-row" style="grid-template-columns: repeat(3, 1fr);margin-bottom:0;">
        <div class="stat-card blue">
          <div class="stat-icon blue">📅</div>
          <div><div class="stat-num" id="statAttendanceDays2">0</div><div class="stat-lbl">出勤天数</div></div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon green">✅</div>
          <div><div class="stat-num" id="statNormalDays">0</div><div class="stat-lbl">正常打卡</div></div>
        </div>
        <div class="stat-card orange">
          <div class="stat-icon orange">⏰</div>
          <div><div class="stat-num" id="statLateDays2">0</div><div class="stat-lbl">迟到次数</div></div>
        </div>
        <div class="stat-card red">
          <div class="stat-icon red">❌</div>
          <div><div class="stat-num" id="statMissingDays2">0</div><div class="stat-lbl">缺卡次数</div></div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon blue">📝</div>
          <div><div class="stat-num" id="statLeaveDays2">0</div><div class="stat-lbl">请假天数</div></div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon green">📊</div>
          <div><div class="stat-num" id="statTotalRecords">0</div><div class="stat-lbl">总打卡记录</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 近期打卡记录 -->
  <div class="card">
    <div class="card-hd"><h3>近期打卡记录</h3><span style="font-size:12px;color:var(--gray-400);">最近10条</span></div>
    <div class="card-bd zero">
      <table>
        <thead><tr><th>日期</th><th>上班打卡</th><th>下班打卡</th><th>状态</th></tr></thead>
        <tbody id="recentTableBody">
          <tr><td colspan="4" style="text-align:center;color:var(--gray-400);padding:30px;">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
// 将模板内容注入主容器
var template = document.getElementById('detailTemplate').innerHTML;
document.getElementById('detailContent').innerHTML = template;
</script>
<script src="../js/app.js"></script>
<script>
// 页面加载完成后自动加载员工详情
loadEmployeeDetail();
</script>

</body>
</html>
