# =============================================
# 服务器基础配置
# =============================================
server.port=8080
server.servlet.context-path=/
# 统一请求编码为 UTF-8
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# =============================================
# MySQL 数据源配置（HikariCP 连接池）
# =============================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/oa_office?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# HikariCP 连接池参数
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================
# MyBatis-Plus 3.5.x 配置
# =============================================
# Mapper XML 文件扫描路径
mybatis-plus.mapper-locations=classpath:mapper/*.xml
# 实体类包扫描路径
mybatis-plus.type-aliases-package=com.buu.oa.entity
# 开启数据库下划线字段与Java驼峰命名自动映射
mybatis-plus.configuration.map-underscore-to-camel-case=true
# 控制台打印SQL语句（开发阶段调试用）
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# 主键自增策略
mybatis-plus.global-config.db-config.id-type=auto

# =============================================
# Redis 7.x 配置（缓存 + ZSet 延迟队列）
# =============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
# 连接建立超时时间
spring.data.redis.connect-timeout=10s

# Lettuce 连接池参数
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-idle=20
spring.data.redis.lettuce.pool.max-active=20
# 最大等待时间，-1 表示无限等待
spring.data.redis.lettuce.pool.max-wait=-1ms

# =============================================
# 文件上传配置（发票上传功能）
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# =============================================
# Jackson 全局日期格式
# =============================================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.serialization.write-dates-as-timestamps=false

# =============================================
# 自定义 JWT 配置（配合 Spring Security + JWT 使用）
# =============================================
jwt.secret=oa-office-system-secret-key-2026-abcdefghijklmnopqrstuvwxyz
# Token 有效期：24小时（单位：毫秒）
jwt.expire-time=86400000

# =============================================
# 日志配置
# =============================================
logging.level.root=info
logging.level.com.buu.oa=debug
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n
